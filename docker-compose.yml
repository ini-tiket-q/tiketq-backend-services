version: "3.9"

services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      - auth-service
      - user-service
      - flights-service
      - ferries-service
      - hotels-service
      - ppob-service
      - payment-service
      - transaction-service
    networks:
      - tiketq-net
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    ports:
      - "8002:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  flights-service:
    build:
      context: ./flights-service
    container_name: flights-service
    ports:
      - "8003:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  ferries-service:
    build:
      context: ./ferries-service
    container_name: ferries-service
    ports:
      - "8004:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  hotels-service:
    build:
      context: ./hotels-service
    container_name: hotels-service
    ports:
      - "8005:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  ppob-service:
    build:
      context: ./ppob-service
    container_name: ppob-service
    ports:
      - "8006:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    ports:
      - "8007:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  transaction-service:
    build:
      context: ./transaction-service
    container_name: transaction-service
    ports:
      - "8008:8000"
    env_file:
      - .env
    networks:
      - tiketq-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80" # Disederhanakan, hanya port 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - tiketq-net
    restart: unless-stopped

networks:
  tiketq-net:
    driver: bridge

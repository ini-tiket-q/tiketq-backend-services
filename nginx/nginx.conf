worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Definisi upstream, ini sudah benar
    upstream api_gateway { server api-gateway:8000; }
    upstream auth_service { server auth-service:8000; }
    upstream user_service { server user-service:8000; }
    upstream flights_service { server flights-service:8000; }
    upstream ferries_service { server ferries-service:8000; }
    upstream hotels_service { server hotels-service:8000; }
    upstream ppob_service { server ppob-service:8000; }
    upstream payment_service { server payment-service:8000; }
    upstream transaction_service { server transaction-service:8000; }

    # ==========================================================
    # BLOK "SATPAM" (Default Server untuk Menolak Request Asing)
    # Letakkan blok ini di PALING ATAS, sebelum server block lainnya.
    # ==========================================================
    server {
        listen 80 default_server;
        server_name _; # Tanda _ berarti cocok dengan apa pun

        # Opsi 1: Menutup koneksi tanpa respons (lebih aman)
        return 444;

        # Opsi 2: Mengembalikan error 404 (lebih informatif)
        # return 404;
    }

    # ==========================================================
    # Blok server untuk layanan Anda (TIDAK ADA PERUBAHAN)
    # ==========================================================
    server {
        listen 80;
        server_name satria-dev.site www.satria-dev.site api.satria-dev.site;
        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
    server {
        listen 80;
        server_name auth.satria-dev.site;
        location / { proxy_pass http://auth_service; proxy_set_header Host $host; }
    }
    # ... dan semua server block Anda yang lain tetap sama ...
    server {
        listen 80;
        server_name user.satria-dev.site;
        location / { proxy_pass http://user_service; proxy_set_header Host $host; }
    }
    server {
        listen 80;
        server_name flights.satria-dev.site;
        location / { proxy_pass http://flights_service; proxy_set_header Host $host; }
    }
    server {
        listen 80;
        server_name ferries.satria-dev.site;
        location / { proxy_pass http://ferries_service; proxy_set_header Host $host; }
    }
    server {
        listen 80;
        server_name hotels.satria-dev.site;
        location / { proxy_pass http://hotels_service; proxy_set_header Host $host; }
    }
    server {
        listen 80;
        server_name ppob.satria-dev.site;
        location / { proxy_pass http://ppob_service; proxy_set_header Host $host; }
    }
    server {
        listen 80;
        server_name payment.satria-dev.site;
        location / { proxy_pass http://payment_service; proxy_set_header Host $host; }
    }
    server {
        listen 80;
        server_name transaction.satria-dev.site;
        location / { proxy_pass http://transaction_service; proxy_set_header Host $host; }
    }
}
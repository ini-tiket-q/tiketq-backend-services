worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    upstream api_gateway {
        server api-gateway:8000;
    }

    upstream auth_service {
        server auth-service:8000;
    }

    upstream user_service {
        server user-service:8000;
    }

    upstream flights_service {
        server flights-service:8000;
    }

    upstream ferries_service {
        server ferries-service:8000;
    }

    upstream hotels_service {
        server hotels-service:8000;
    }

    upstream ppob_service {
        server ppob-service:8000;
    }

    upstream payment_service {
        server payment-service:8000;
    }

    server {
        listen 80;
        server_name _;

        # Proxy all API requests to API Gateway
        location / {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Optional: expose services directly if needed (not recommended)
        # Uncomment if you want direct access for debugging or internal use

